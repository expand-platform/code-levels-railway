{% load i18n %}

<div class="col row justify-content-end align-items-end">
    <form method="get" class="projects-toggle-section col d-flex justify-content-end column-gap-3 mb-3" >
      <div class="d-flex column-gap-2 align-items-center me-3">
        <span class="reset-button">{% trans "Reset Filters" %}</span>
        <span id="search-icon" style="cursor:pointer; font-size:1.3em; color: black;">
          <i class="bi bi-search"></i>
        </span>
        <input id="project-search-input" name="search" type="text" class="form-control ms-2" style="display:none; width:180px;" placeholder="{% trans 'Search projects...' %}" value="{{ request.GET.search|default:'' }}">
      </div>
      <div class="d-flex flex-column align-items-end">
        <select id="projects-toggle-select" name="filter" class="form-select" style="width: auto;" onchange="this.form.submit()">
          <option value="course" {% if filter_by == 'course' %} selected {% endif %}>{% trans 'By Course' %}</option>
          <option value="language" {% if filter_by == 'language' %} selected {% endif %}>{% trans 'By Language' %}</option>
        </select>
        </div>
      <div class="d-flex flex-column align-items-end">
        <select id="projects-type-select" name="type" class="form-select" style="width: auto;" onchange="this.form.submit()">
          <option value="all" {% if project_type == 'all' or not project_type %}selected{% endif %}>{% trans 'All' %}</option>
          <option value="topic" {% if project_type == 'topic' %}selected{% endif %}>{% trans 'Topic' %}</option>
          <option value="project" {% if project_type == 'project' %}selected{% endif %}>{% trans 'Project' %}</option>
        </select>
      </div>
    </form>
  </div>
