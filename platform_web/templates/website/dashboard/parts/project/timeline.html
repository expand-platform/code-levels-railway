<section class="simple-timeline" id="project-simple-timeline">
	<div class="simple-timeline__header">
		<button type="button" class="simple-timeline__nav hidden" data-action="prev" aria-label="Previous stage">Prev</button>
		<div class="simple-timeline__track" id="timeline-track" role="tablist" aria-label="Project stages"></div>
		<button type="button" class="simple-timeline__nav hidden" data-action="next" aria-label="Next stage">Next</button>
	</div>

	<article class="simple-timeline__content" id="timeline-content" aria-live="polite">
		<h3 class="simple-timeline__title" id="timeline-title"></h3>
		<p class="simple-timeline__text" id="timeline-text"></p>
	</article>

	<div id="project-stages-raw" class="d-none">{{ project.stages|safe }}</div>
</section>
