{% load i18n %}

<div id="projectsSidebarCollapse" class="collapse submenu-collapse show">
  <ul class="submenu">
    <li>
      <a href="{% url 'projects' %}" data-route="projects">
        <i class="bi bi-journal-code text-black"></i>
        <span class="text-black clipped-text">{% trans 'All courses' %}</span>
      </a>
    </li>

    {% for course in sidebar_project_courses %}
      <li>
        <a href="{% url 'projects_by_course' course.slug %}" data-route="projects">
          <i class="bi bi-journal-code text-black"></i>
          <span class="text-black clipped-text">{{ course.title }}</span>
        </a>
      </li>
    {% endfor %}
  </ul>
</div>
